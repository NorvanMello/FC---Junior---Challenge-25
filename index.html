<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/favicon-32x32.png">
  <link rel="stylesheet" href="style.css">
  
  <title>GitHub user search app</title>
</head>
<body>

  <main id="main-card">
    <header id="logo">
      <span class="logo-text">devfinder</span>

      <button id="theme">
        <span class="theme-label">LIGHT</span>  
        <img class="theme-icon" src="./assets/icon-sun.svg" alt=""> 
      </button>
    </header>

    <section class="search">
      <div class="search-input">
        <img src="./assets/icon-search.svg" alt="">
        <input id="input-id" type="text" placeholder="Search GitHub username...">
      </div>
      <button>Search</button> 
    </section>

    <section  class="main-body">
      <div class="profile-container">
        <picture class="img-profile">
          <img class="user-img" src="./assets/ChatGPT Image 17 de abr. de 2026, 17_32_42.png" alt="">
        </picture>

        <div class="profile-header">
          <div class="user-details">
            <h1 class="username"></h1>
            <span class="at-username"></span>
            <span class="date">Joined 25 Jan 2011</span>
          </div>
        </div>
      </div>

      <div class="profile-info">
        <div class="bio-info">
          <p class="bio-text"></p>
        </div>

        <div class="stats-section">
          <p class="repos">
            Repos

            <span class="github-count repos-count"></span>
          </p>
          <p class="followers">
            Followers

            <span class="github-count followers-count"></span>
          </p>
          <p class="following">
            Following

            <span class="github-count following-count"></span>
          </p>
        </div>
  
        <div class="links-section">
          <div class="link">
            <img src="./assets/icon-location.svg" alt="">
            <span class="location-link-text">San Francisco</span>
          </div>
          <div class="link">
            <img src="./assets/icon-twitter.svg" alt="">
            <span class="twitter-link-text">Not Available</span>
          </div>
          <div class="link">
            <img src="./assets/icon-website.svg" alt="">
            <span class="website-link-text">https://github.blog</span>
          </div>
          <div class="link">
            <img src="./assets/icon-company.svg" alt="">
            <span class="company-link-text">@github</span>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
