<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/favicon-32x32.png">
  <link rel="stylesheet" href="style.css">
  
  <title>GitHub user search app</title>
</head>
<body>

  <main id="main-card">
    <header id="logo">
      <span id="logo-text">devfinder</span>

      <button id="theme">LIGHT <img src="./assets/icon-sun.svg" alt=""> </button>
    </header>

    <section id="search">
      <div id="search-input">
        <img src="./assets/icon-search.svg" alt="">
        <input id="input-id" type="text" placeholder="Search GitHub username...">
      </div>
      <button>Search</button>
      
    </section>

    <section  id="main-body">
      <div class="profile-container">
        <picture class="img-profile">
          <img src="./assets/ChatGPT Image 17 de abr. de 2026, 17_32_42.png" alt="">
        </picture>

        <div class="profile-header">
          <div class="user-details">
            <h1 class="name">The Octocat</h1>
            <span class="at">@octocat</span>
            <span class="date">Joined 25 Jan 2011</span>
          </div>
        </div>
      </div>

      <div class="profile-info">

      </div>
    </section>
  </main>


  <!--
  Dark

  
  

  Joined

  Repos
  Followers
  Following -->


  <script src="script.js"></script>
</body>
</html>
