<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/favicon-32x32.png">
  <link rel="stylesheet" href="style.css">
  
  <title>GitHub user search app</title>
</head>
<body>

  <main id="main-card">
    <header id="logo">
      <span class="logo-text">devfinder</span>

      <button id="theme" type="button" aria-pressed="false">
        <span class="theme-label">LIGHT</span>  
        <img class="theme-icon" src="./assets/icon-sun.svg" alt=""> 
      </button>
    </header>

    <section class="search">
      <label for="input-id" class="hidden">Search GitHub username</label>
      <form class="search-form" action="/search" method="GET">
        <div class="search-input">
          <img src="./assets/icon-search.svg" alt="">
          <input id="input-id" type="text" placeholder="Search GitHub username..." aria-label="Search GitHub username">
        </div>
        <button type="submit" class="input-btn">Search</button> 
      </form>
    </section>

    <section  class="main-body">
      <article class="profile-container">
        <picture class="img-profile">
          <img class="user-img" src="./assets/ChatGPT Image 17 de abr. de 2026, 17_32_42.png" alt="">
        </picture>

        <div class="profile-header">
          <div class="user-details">
            <span class="username"></span>
            <span class="at-username"></span>
            <span class="date"></span>
          </div>
        </div>
      </article>

      <div class="profile-info">
        <div class="bio-info">
          <p class="bio-text"></p>
        </div>

        <dl class="stats-section">
          <div class="repos">
            
            <dt class="repos-label">Repos</dt>
            <dd class="github-count repos-count">0</dd>
          </div>
          
          <div class="followers">
            
            <dt class="followers-label">Followers</dt>
            <dd class="github-count followers-count">0</dd>
          </div>
          
          <div class="following">
            
            <dt class="followers-label">Following</dt>
            <dd class="github-count following-count">0</dd>
          </div>
        </dl>
  
        <div class="links-section">
          <div class="link">
            <img src="./assets/icon-location.svg" alt="">
            <span class="location-link-text">Not Available</span>
          </div>
          <a class="link twitter-link">
            <img src="./assets/icon-twitter.svg" alt="">
            <span class="twitter-link-text">Not Available</span>
          </a>
          <a class="link website-link">
            <img src="./assets/icon-website.svg" alt="">
            <span class="website-link-text">Not Available</span>
          </a>
          <div class="link">
            <img src="./assets/icon-company.svg" alt="">
            <span class="company-link-text">Not Available</span>
          </div>
        </div>
      </div>
    </section>

    <section class="error-container hidden">
      <div class="error-body">
        <p class="error-title">
          No results found!
        </p>

        <p class="error-text">
          We couldn’t find any GitHub users matching your search. Please double-check the username and try again.
        </p>
      </div>

    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
