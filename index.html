<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/favicon-32x32.png">
  <link rel="stylesheet" href="style.css">
  
  <title>GitHub user search app</title>
</head>
<body>

  <main id="main-card">
    <header id="logo">
      <span class="logo-text">devfinder</span>

      <button id="theme">LIGHT <img src="./assets/icon-sun.svg" alt=""> </button>
    </header>

    <section class="search">
      <div class="search-input">
        <img src="./assets/icon-search.svg" alt="">
        <input id="input-id" type="text" placeholder="Search GitHub username...">
      </div>
      <button>Search</button>
      
    </section>

    <section  class="main-body">
      <div class="profile-container">
        <picture class="img-profile">
          <img src="./assets/ChatGPT Image 17 de abr. de 2026, 17_32_42.png" alt="">
        </picture>

        <div class="profile-header">
          <div class="user-details">
            <h1 class="name">The Octocat</h1>
            <span class="at">@octocat</span>
            <span class="date">Joined 25 Jan 2011</span>
          </div>
        </div>
      </div>

      <div class="profile-info">
        <div class="bio-info">
          <p>This profile has no bio</p>
        </div>

        <div class="stats-section">
          <p class="repos">
            Repos

            <span>8</span>
          </p>
          <p class="followers">
            Followers

            <span>3938</span>
          </p>
          <p class="following">
            Following

            <span>9</span>
          </p>
        </div>
  
        <div class="links-section">
          <div>
            <img src="./assets/icon-location.svg" alt="">
            <span>San Francisco</span>
          </div>
          <div>
            <img src="./assets/icon-twitter.svg" alt="">
            <span>Not Available</span>
          </div>
          <div>
            <img src="./assets/icon-website.svg" alt="">
            <span>https://github.blog</span>
          </div>
          <div>
            <img src="./assets/icon-company.svg" alt="">
            <span>@github</span>
          </div>
        </div>
      </div>
    </section>
  </main>


  <!--
  Dark

  
  

  Joined

  Repos
  Followers
  Following -->


  <script src="script.js"></script>
</body>
</html>
